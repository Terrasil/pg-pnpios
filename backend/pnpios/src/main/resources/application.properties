spring.application.name=pnpios

currency.rates.api.url=https://api.nbp.pl
currency.rates.cache-file=cache/currency-rates.json
currency.rates.remote-enabled=true

spring.cloud.openfeign.client.config.currencyRatesClient.connectTimeout=3000
spring.cloud.openfeign.client.config.currencyRatesClient.readTimeout=5000
spring.cloud.openfeign.client.config.currencyRatesClient.loggerLevel=full

logging.level.pl.pg.pnpios.external.CurrencyRatesClient=DEBUG
logging.level.feign=DEBUG

openlibrary.api.base-url=https://openlibrary.org
openlibrary.api.url=https://openlibrary.org
internetarchive.api.url=https://archive.org
openlibrary.author-works-limit=20

google.books.api.enabled=false
google.books.api.base-url=https://www.googleapis.com/books/v1
google.books.api.key=
google.books.country=PL
google.books.offer-countries=PL,US,GB,DE

ebay.api.enabled=false
ebay.api.client-id=
ebay.api.client-secret=
ebay.api.base-url=https://api.ebay.com
ebay.api.identity-url=https://api.ebay.com
ebay.api.marketplace-id=EBAY_GB
ebay.api.scope=https://api.ebay.com/oauth/api_scope

spring.cloud.openfeign.client.config.openLibraryClient.connectTimeout=5000
spring.cloud.openfeign.client.config.openLibraryClient.readTimeout=10000
spring.cloud.openfeign.client.config.openLibraryClient.loggerLevel=full
spring.cloud.openfeign.client.config.googleBooksClient.connectTimeout=5000
spring.cloud.openfeign.client.config.googleBooksClient.readTimeout=12000
spring.cloud.openfeign.client.config.googleBooksClient.loggerLevel=full
spring.cloud.openfeign.client.config.ebayBrowseClient.connectTimeout=5000
spring.cloud.openfeign.client.config.ebayBrowseClient.readTimeout=12000
spring.cloud.openfeign.client.config.ebayBrowseClient.loggerLevel=full
spring.cloud.openfeign.client.config.ebayIdentityClient.connectTimeout=5000
spring.cloud.openfeign.client.config.ebayIdentityClient.readTimeout=12000
spring.cloud.openfeign.client.config.ebayIdentityClient.loggerLevel=full

logging.level.pl.pg.pnpios.external.OpenLibraryClient=DEBUG
logging.level.pl.pg.pnpios.external.GoogleBooksClient=DEBUG
logging.level.pl.pg.pnpios.external.EbayBrowseClient=DEBUG
logging.level.pl.pg.pnpios.external.EbayIdentityClient=DEBUG
